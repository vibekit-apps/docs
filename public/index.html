<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeKit Docs</title>
  <meta name="description" content="VibeKit API and CLI docs. Rendered from the canonical SKILL.md so docs stop drifting.">
  <meta name="theme-color" content="#000000">
  <link rel="icon" href="https://vibekit.bot/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Permanent+Marker&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
            marker: ['Permanent Marker', 'cursive'],
          }
        }
      }
    }
  </script>
  <style>
    body {
      background: #000;
      color: #fff;
      min-height: 100vh;
      line-height: 1.65;
      font-family: Inter, system-ui, sans-serif;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 100%);
      opacity: 0.28;
      z-index: -2;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: url('https://vibekit.bot/bg2.webp') center/cover no-repeat;
      opacity: 0.16;
      z-index: -3;
    }
    .glass {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(14px);
    }
    .prose-custom h1,
    .prose-custom h2,
    .prose-custom h3,
    .prose-custom h4 {
      color: #fff;
      scroll-margin-top: 96px;
    }
    .prose-custom h1 { font-size: 2.5rem; line-height: 1.1; margin: 0 0 1rem; }
    .prose-custom h2 { font-size: 1.65rem; margin: 2.5rem 0 1rem; }
    .prose-custom h3 { font-size: 1.2rem; margin: 1.75rem 0 0.75rem; }
    .prose-custom p,
    .prose-custom li { color: #d1d5db; }
    .prose-custom a { color: #fff; text-decoration: underline; text-underline-offset: 2px; }
    .prose-custom code {
      font-family: 'JetBrains Mono', monospace;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 0.15rem 0.35rem;
      border-radius: 0.4rem;
      color: #f8fafc;
      font-size: 0.92em;
      word-break: break-word;
    }
    .prose-custom pre {
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 1rem;
      overflow-x: auto;
      margin: 1rem 0 1.25rem;
    }
    .prose-custom pre code {
      background: transparent;
      border: 0;
      padding: 0;
      border-radius: 0;
      display: block;
      white-space: pre;
    }
    .prose-custom blockquote {
      border-left: 3px solid rgba(255,255,255,0.25);
      padding-left: 1rem;
      color: #cbd5e1;
      margin: 1rem 0;
    }
    .prose-custom hr {
      border: 0;
      border-top: 1px solid rgba(255,255,255,0.12);
      margin: 2rem 0;
    }
    .prose-custom ul,
    .prose-custom ol { padding-left: 1.25rem; }
    .prose-custom table {
      width: 100%;
      border-collapse: collapse;
      display: block;
      overflow-x: auto;
      margin: 1rem 0;
    }
    .prose-custom th,
    .prose-custom td {
      border: 1px solid rgba(255,255,255,0.12);
      padding: 0.6rem 0.75rem;
      text-align: left;
      color: #d1d5db;
    }
    .prose-custom th { color: #fff; background: rgba(255,255,255,0.05); }
    .loading { color: #9ca3af; }
    @media (max-width: 640px) {
      .prose-custom h1 { font-size: 1.9rem; }
      .prose-custom h2 { font-size: 1.35rem; }
      .prose-custom pre { padding: 0.8rem; }
    }
  </style>
</head>
<body>
  <header class="sticky top-0 z-10 border-b border-white/10 bg-black/70 backdrop-blur-xl">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4 sm:px-6">
      <a href="https://vibekit.bot" class="flex items-center gap-3">
        <img src="https://vibekit.bot/Group2.png" alt="VibeKit" class="h-8 w-8">
        <span class="font-marker text-xl text-white">VibeKit</span>
      </a>
      <div class="flex items-center gap-3 text-sm">
        <a href="https://app.vibekit.bot" class="text-gray-400 transition hover:text-white">Dashboard</a>
        <a href="https://vibekit.bot/SKILL.md" class="rounded-lg border border-white/10 bg-white/5 px-3 py-2 text-white transition hover:bg-white/10">Raw markdown</a>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-8 sm:px-6 sm:py-10">
    <section class="glass mb-6 rounded-2xl p-5 sm:p-6">
      <div class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <div class="mb-2 inline-flex items-center rounded-full border border-white/10 bg-white/5 px-3 py-1 text-xs font-semibold uppercase tracking-[0.2em] text-gray-300">Canonical docs</div>
          <h1 class="text-3xl font-semibold tracking-tight text-white sm:text-4xl">API + CLI docs rendered from <code>vibekit.bot/SKILL.md</code></h1>
          <p class="mt-3 max-w-3xl text-sm text-gray-400 sm:text-base">One source of truth. Less drift. Less bullshit.</p>
        </div>
      </div>
    </section>

    <section class="glass rounded-2xl p-5 sm:p-8">
      <div id="content" class="prose-custom loading">Loading docs...</div>
    </section>
  </main>

  <script>
    marked.setOptions({ gfm: true, breaks: false, mangle: false, headerIds: true });

    fetch('https://vibekit.bot/SKILL.md', { cache: 'no-store' })
      .then((res) => {
        if (!res.ok) throw new Error('Failed to load SKILL.md');
        return res.text();
      })
      .then((markdown) => {
        const content = document.getElementById('content');
        content.classList.remove('loading');
        content.innerHTML = marked.parse(markdown);
      })
      .catch((err) => {
        const content = document.getElementById('content');
        content.classList.remove('loading');
        content.innerHTML = '<div class="rounded-xl border border-red-500/30 bg-red-500/10 p-4 text-red-200">Failed to load docs: ' + err.message + '</div>';
      });
  </script>
</body>
</html>
